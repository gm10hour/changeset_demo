name: Changesets

on:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}

jobs:
  version:
    timeout-minutes: 15
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # changeset version 需要 git 历史

      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install

      # 手写 version + commit，不靠 action 的 publish 兜底
      - name: Check for changesets
        id: has_cs
        run: |
          COUNT=$(ls .changeset/*.md 2>/dev/null | wc -l)
          echo "count=$COUNT" >> $GITHUB_OUTPUT

      - name: Version + commit (if any changeset)
        if: steps.has_cs.outputs.count != '0'
        run: |
          pnpm changeset version
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "chore: update versions [skip ci]" || echo "nothing to commit"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # publish 单独走另一条 workflow（或干脆不发，单包 demo 可以不要）